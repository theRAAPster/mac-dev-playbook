---
configure_dotfiles: false
configure_osx: true

# Set to 'true' to configure the Dock via dockutil.
configure_dock: true
dockitems_remove:
  - Mail
  - Maps
  - Facetime
  - Phone
  - Contacts
  - TV
  - Music
  - Games
dockitems_persist: []
# - name: "Sublime Text"
#   path: "/Applications/Sublime Text.app/"
#   pos: 5

configure_sudoers: false
sudoers_custom_config: ""
# Example:
# sudoers_custom_config: |
#   # Allow users in admin group to use sudo with no password.
#   %admin ALL=(ALL) NOPASSWD: ALL

dotfiles_repo: https://github.com/theRAAPster/dotfiles.git
dotfiles_repo_accept_hostkey: true
dotfiles_repo_local_destination: ~/repos/dotfiles
dotfiles_repo_version: main # Replace with your default branch
dotfiles_files:
  - .bash_aliases
  - .gitconfig
  - .gitignoredefault
  - .osx

homebrew_installed_packages:
  - aws-cdk
  - aws-shell
  - awscli
  - curl
  - docker
  - ffmpeg
  - git
  - hugo
  - jq
  - markdownlint-cli
  - mas
  - nmap
  - node
  - node@24
  - powershell
  - pre-commit
  - stow
  - telnet
  - yt-dlp

homebrew_taps: []

homebrew_cask_appdir: /Applications
homebrew_cask_apps:
  - 1password
  - 1password-cli
  - balenaetcher
  - discord
  - elgato-control-center
  - elgato-stream-deck
  - firefox
  - ghostty
  - google-chrome
  - halloy
  - iterm2
  - logi-options+
  - mediainfo
  - mkvtoolnix
  - plex
  - raspberry-pi-imager
  - secretive
  - sequel-ace
  - transmit
  - ultimaker-cura
  - veracrypt
  - visual-studio-code
  - vlc

# See `geerlingguy.mac.mas` role documentation for usage instructions.
mas_installed_apps:
  - { id: 1569813296, name: "1Password for Safari" }
  - { id: 404009241, name: "BBEdit" }
  - { id: 1381004916, name: "Discovery" }
  - { id: 949582631, name: "HDHomeRun" }
  - { id: 1099568401, name: "Home Assistant" }
  - { id: 1481302432, name: "Instapaper Save" }
  - { id: 462058435, name: "Microsoft Excel" }
  - { id: 784801555, name: "Microsoft OneNote" }
  - { id: 462054704, name: "Microsoft Word" }
  - { id: 1455214828, name: "MQTT Explorer" }
  - { id: 823766827, name: "Onedrive" }
  - { id: 1475387142, name: "Tailscale" }
  - { id: 425424353, name: "The Unarchiver" }
  - { id: 1451685025, name: "WireGuard" }
  - { id: 497799835, name: "Xcode" }
mas_email: ""
mas_password: ""

osx_script: "~/.osx --no-restart"

# Install packages from other package managers.
# Note: You are responsible for making sure the required package managers are
# installed, eg. through homebrew.
composer_packages: []
# - name: drush
#   state: present # present/absent, default: present
#   version: "^8.1" # default: N/A
gem_packages: []
# - name: bundler
#   state: present # present/absent/latest, default: present
#   version: "~> 1.15.1" # default: N/A
npm_packages: []
# - name: webpack
#   state: present # present/absent/latest, default: present
#   version: "^2.6" # default: N/A
pip_packages: []
# - name: mkdocs
#   state: present # present/absent/latest, default: present
#   version: "0.16.3" # default: N/A

# Glob pattern to ansible task files to run after all other tasks are finished.
post_provision_tasks: []
